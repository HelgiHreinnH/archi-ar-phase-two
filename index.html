    <meta charset="UTF-8" />

    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

    <!-- Preconnect to external CDNs we hit at AR launch — saves DNS+TLS round-trips -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
    <link rel="preconnect" href="https://ga.jspm.io" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
    <link rel="dns-prefetch" href="https://ga.jspm.io" />

    <!-- es-module-shims polyfill for import maps on older Safari/iOS/Firefox -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <!-- Import map MUST appear before any module scripts so MindAR can resolve "three".
         Audit C-1 (May 2026): point "three" at the self-hosted copy so MindAR and the
         AR scene loaders share a single Three.js module instance (instanceof checks
         across modules previously broke silently). -->
    <script type="importmap">
      {
        "imports": {
          "three": "/assets/three/three.module.js",
          "three/addons/": "/assets/three/jsm/",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
      }
    </script>

  <meta property="og:title" content="Archi AR">

  <meta name="twitter:description" content="The Archi AR prototype">
</head>
